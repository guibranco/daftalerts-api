name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DaftAlerts.sln

      - name: Build
        run: dotnet build DaftAlerts.sln --configuration Release --no-restore

      - name: Install coverage tool
        run: dotnet tool install --global dotnet-coverage

      - name: Test with coverage
        run: |
          dotnet-coverage collect \
            "dotnet test DaftAlerts.sln --configuration Release --no-build --logger 'trx;LogFileName=test-results.trx'" \
            -f xml -o coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-ingest:
    name: Publish EmailIngest single-file
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish EmailIngest
        run: |
          dotnet publish src/DaftAlerts.EmailIngest/DaftAlerts.EmailIngest.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:InvariantGlobalization=true \
            --output ./artifacts/ingest

      - name: Package
        run: |
          cd artifacts
          tar -czf DaftAlerts.EmailIngest-linux-x64.tar.gz ingest
          sha256sum DaftAlerts.EmailIngest-linux-x64.tar.gz > DaftAlerts.EmailIngest-linux-x64.tar.gz.sha256

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaftAlerts.EmailIngest-linux-x64
          path: artifacts/DaftAlerts.EmailIngest-linux-x64.tar.gz*

  docker:
    name: Build & push Docker image
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
