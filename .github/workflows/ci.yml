name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

permissions:
  contents: write          # needed for tag + release creation
  packages: write          # needed for GHCR push

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    outputs:
      fullSemVer:    ${{ steps.gitversion.outputs.fullSemVer }}
      semVer:        ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
      sha: ${{ steps.gitversion.outputs.sha }}
      isMain: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DaftAlerts.sln

      - name: Build
        run: |
          dotnet build DaftAlerts.sln \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Test with coverage
        run: |
          dotnet test DaftAlerts.sln \
            --configuration Release --no-build \
            --logger trx --results-directory TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: TestResults/**/coverage.cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  publish-ingest:
    name: Publish EmailIngest single-file
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish EmailIngest
        run: |
          dotnet publish src/DaftAlerts.EmailIngest/DaftAlerts.EmailIngest.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:InvariantGlobalization=true \
            -p:Version=${{ needs.build-and-test.outputs.assemblySemVer }} \
            -p:AssemblyVersion=${{ needs.build-and-test.outputs.assemblySemVer }} \
            -p:FileVersion=${{ needs.build-and-test.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ needs.build-and-test.outputs.informationalVersion }} \
            --output ./artifacts/ingest

      - name: Package
        run: |
          cd artifacts
          VERSION="${{ needs.build-and-test.outputs.fullSemVer }}"
          tar -czf "DaftAlerts.EmailIngest-${VERSION}-linux-x64.tar.gz" ingest
          sha256sum "DaftAlerts.EmailIngest-${VERSION}-linux-x64.tar.gz" > "DaftAlerts.EmailIngest-${VERSION}-linux-x64.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaftAlerts.EmailIngest-linux-x64
          path: artifacts/DaftAlerts.EmailIngest-*-linux-x64.tar.gz*

  docker:
    name: Build & push Docker image
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.build-and-test.outputs.fullSemVer }}
            type=raw,value=${{ needs.build-and-test.outputs.majorMinorPatch }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.version=${{ needs.build-and-test.outputs.fullSemVer }}
            org.opencontainers.image.revision=${{ needs.build-and-test.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=DaftAlerts API
            org.opencontainers.image.description=Personal Daft.ie property aggregator API

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.fullSemVer }}
            ASSEMBLY_VERSION=${{ needs.build-and-test.outputs.assemblySemVer }}
            FILE_VERSION=${{ needs.build-and-test.outputs.assemblySemFileVer }}
            INFORMATIONAL_VERSION=${{ needs.build-and-test.outputs.informationalVersion }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Tag & release
    needs: [build-and-test, publish-ingest, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download EmailIngest artifact
        uses: actions/download-artifact@v4
        with:
          name: DaftAlerts.EmailIngest-linux-x64
          path: ./artifacts

      - name: Create tag & release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-and-test.outputs.fullSemVer }}
          name: v${{ needs.build-and-test.outputs.fullSemVer }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/DaftAlerts.EmailIngest-*-linux-x64.tar.gz
            artifacts/DaftAlerts.EmailIngest-*-linux-x64.tar.gz.sha256
          body: |
            ## DaftAlerts ${{ needs.build-and-test.outputs.fullSemVer }}

            **Docker image:** `ghcr.io/${{ github.repository }}:${{ needs.build-and-test.outputs.fullSemVer }}`

            ### Artifacts
            - `DaftAlerts.EmailIngest-${{ needs.build-and-test.outputs.fullSemVer }}-linux-x64.tar.gz` — self-contained EmailIngest binary
            - Docker image published to GHCR with tags `${{ needs.build-and-test.outputs.fullSemVer }}`, `${{ needs.build-and-test.outputs.majorMinorPatch }}`, `latest`
